# Copiar este arquivo para: /etc/nginx/conf.d/english.conf
# Após copiar, executar:
#   mkdir -p /var/www/certbot
#   nginx -t && nginx -s reload
#   certbot certonly --webroot -w /var/www/certbot -d english.forestcode.vps-kinghost.net
#   certbot certonly --webroot -w /var/www/certbot -d portal-apps.com.br -d www.portal-apps.com.br
#   nginx -s reload

# ── HTTP: redirect para HTTPS + desafio certbot ───────────────────────────────
server {
    listen 80;
    server_name english.forestcode.vps-kinghost.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTP: portal-apps (atualize o DNS para este servidor) ────────────────────
server {
    listen 80;
    server_name portal-apps.com.br www.portal-apps.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: portal-apps (ativado após emitir o certificado) ──────────────────
server {
    listen 443 ssl;
    server_name portal-apps.com.br www.portal-apps.com.br;

    ssl_certificate     /etc/letsencrypt/live/portal-apps.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal-apps.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ── HTTPS: English App (ativar após obter certificado) ───────────────────────
server {
    listen 443 ssl;
    server_name english.forestcode.vps-kinghost.net;

    ssl_certificate     /etc/letsencrypt/live/english.forestcode.vps-kinghost.net/fullchain.pem;
