version: "3.9"

services:
  apache:
    container_name: english-apache
    build:
      context: ./apache
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - shared_network

  app:
    container_name: english-app
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://english.forestcode.vps-kinghost.net}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_me_in_production}
      LIBRETRANSLATE_URL: http://english-libretranslate:5000
      LIBRETRANSLATE_API_KEY: ""
    depends_on:
      - libretranslate
    restart: unless-stopped
    networks:
      - shared_network

  libretranslate:
    container_name: english-libretranslate
    image: libretranslate/libretranslate:latest
    expose:
      - "5000"
    environment:
      LT_LOAD_ONLY: "en,pt"
      LT_API_KEYS: "false"
    restart: unless-stopped
    networks:
      - shared_network

volumes:
  certbot-webroot:

networks:
  shared_network:
    external: true
