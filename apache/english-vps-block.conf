# Configuração para Apache instalado diretamente no host da VPS (sem Docker).
# Copiar este arquivo para: /etc/apache2/sites-available/english.conf
#
# Após copiar, executar:
#   a2enmod proxy proxy_http proxy_wstunnel rewrite deflate headers ssl
#   mkdir -p /var/www/certbot
#   a2ensite english
#   apache2ctl configtest && systemctl reload apache2
#   certbot certonly --webroot -w /var/www/certbot -d english.forestcode.vps-kinghost.net
#   systemctl reload apache2

# ── HTTP: redireciona para HTTPS + desafio certbot ───────────────────────────
<VirtualHost *:80>
    ServerName english.forestcode.vps-kinghost.net
    DocumentRoot /var/www/certbot

    <Directory /var/www/certbot>
        AllowOverride None
        Options None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# ── HTTPS: English App (ativar após obter certificado) ───────────────────────
<VirtualHost *:443>
    ServerName english.forestcode.vps-kinghost.net

    SSLEngine On
    SSLCertificateFile    /etc/letsencrypt/live/english.forestcode.vps-kinghost.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/english.forestcode.vps-kinghost.net/privkey.pem
    SSLProtocol           TLSv1.2 +TLSv1.3
    SSLCipherSuite        HIGH:!aNULL:!MD5
    SSLHonorCipherOrder   On

    LimitRequestBody 52428800

    AddOutputFilterByType DEFLATE text/plain text/css application/json application/javascript text/xml application/xml

    ProxyPreserveHost On
    ProxyPass         / http://127.0.0.1:3000/
    ProxyPassReverse  / http://127.0.0.1:3000/

    # Suporte a WebSocket
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3000/$1 [P,L]

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Real-IP         "%{REMOTE_ADDR}s"

    ProxyTimeout 120

    ErrorLog  /var/log/apache2/english-error.log
    CustomLog /var/log/apache2/english-access.log combined
</VirtualHost>
